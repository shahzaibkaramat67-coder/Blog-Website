<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog Niche Selector</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-white shadow p-4">
    <ul class="flex space-x-8 text-gray-700 font-medium">

      <!-- BLOG ITEM with CHECKBOX DROPDOWN -->
      <li class="relative group">
        <a href="#" class="hover:text-blue-600">Blogs</a>

        <!-- Dropdown Panel -->
        <div class="absolute left-0 mt-3 w-[500px] bg-white shadow-lg border rounded-lg p-4 grid grid-cols-3 gap-4 
                    opacity-0 invisible group-hover:opacity-100 group-hover:visible transition duration-200 z-50">

          <!-- Niche Box with Checkbox -->
          <label class="flex flex-col items-center justify-center border rounded-md p-3 text-center text-sm hover:bg-blue-50 cursor-pointer">
            <input type="checkbox" name="niches" value="Cybersecurity" class="mb-2">
            <span>Cybersecurity</span>
          </label>

          <label class="flex flex-col items-center justify-center border rounded-md p-3 text-center text-sm hover:bg-blue-50 cursor-pointer">
            <input type="checkbox" name="niches" value="AI & ML" class="mb-2">
            <span>AI & ML</span>
          </label>

          <label class="flex flex-col items-center justify-center border rounded-md p-3 text-center text-sm hover:bg-blue-50 cursor-pointer">
            <input type="checkbox" name="niches" value="Web Development" class="mb-2">
            <span>Web Development</span>
          </label>

          <label class="flex flex-col items-center justify-center border rounded-md p-3 text-center text-sm hover:bg-blue-50 cursor-pointer">
            <input type="checkbox" name="niches" value="Fitness" class="mb-2">
            <span>Fitness</span>
          </label>

          <label class="flex flex-col items-center justify-center border rounded-md p-3 text-center text-sm hover:bg-blue-50 cursor-pointer">
            <input type="checkbox" name="niches" value="Photography" class="mb-2">
            <span>Photography</span>
          </label>

          <label class="flex flex-col items-center justify-center border rounded-md p-3 text-center text-sm hover:bg-blue-50 cursor-pointer">
            <input type="checkbox" name="niches" value="Finance" class="mb-2">
            <span>Finance</span>
          </label>

        </div>
      </li>

      <!-- Other nav items -->
      <li><a href="#" class="hover:text-blue-600">About</a></li>
      <li><a href="#" class="hover:text-blue-600">Contact</a></li>
    </ul>
  </nav>

</body>
</html>
