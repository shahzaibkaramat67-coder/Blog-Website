<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navbar Hover Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="#" class="text-lg font-bold text-gray-800">MySite</a>

                    <!-- Blog with Hover Dropdown -->
                    <div class="relative group">
                        <button class="text-gray-700 font-medium hover:text-blue-600 focus:outline-none">
                            Blog
                        </button>

                        <!-- Dropdown content -->
                        <div
                            class="absolute left-0 mt-2 w-64 bg-white shadow-lg border rounded-lg opacity-0 group-hover:opacity-100 invisible group-hover:visible transition duration-200 z-10">
                            <div class="p-4 space-y-2">
                                <div>
                                    <h4 class="text-sm font-semibold text-gray-800">Latest Posts</h4>
                                    <ul class="mt-2 text-sm text-gray-600 space-y-1">
                                        <li><a href="#" class="hover:text-blue-500">→ What is Cybersecurity?</a></li>
                                        <li><a href="#" class="hover:text-blue-500">→ 5 JavaScript Tips</a></li>
                                        <li><a href="#" class="hover:text-blue-500">→ AI Trends in 2025</a></li>
                                    </ul>
                                </div>
                                <hr>
                                <a href="/blog" class="block text-blue-600 text-sm font-semibold hover:underline">View
                                    all posts →</a>
                            </div>
                        </div>
                    </div>

                    <a href="#" class="text-gray-700 hover:text-blue-600">About</a>
                    <a href="#" class="text-gray-700 hover:text-blue-600">Contact</a>
                </div>
            </div>
        </div>
    </nav>

</body>

</html>
